# ── Server ──────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Spring MVC Configuration ────────────────────────────────────
# Ensure all controller endpoints are properly mapped
spring.mvc.log-request-details=false

# ── File uploads ────────────────────────────────────────────────
# FIX: was hardcoded to C:\Final_Projects — that fails on Render (Linux).
# Now reads from env var, falls back to home dir.
resume.upload.dir=${RESUME_UPLOAD_DIR:${user.home}/resume-uploads}
chat.upload.dir=${CHAT_UPLOAD_DIR:${user.home}/chat-uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ── Compression + HTTP/2 ─────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=1024
server.http2.enabled=true

# Max automatic retries on 429 / 5xx errors (0 = no retry)
# Base delay between retries in ms (doubles each attempt)

# ── AI interview question counts ─────────────────────────────────
ai.interview.num-initial-questions=5
ai.interview.questions-per-category=2

# ── Ollama AI Integration ────────────────────────────────────────────
# Base URL for locally-running Ollama instance
ollama.base-url=http://localhost:11434

# Model to use (change this to switch AI models without code changes)
ollama.model=llama3

# Generation parameters
ollama.temperature=0.7
ollama.num-predict=2000

# Retry configuration
ollama.retry.max-attempts=3
ollama.retry.base-delay-ms=1000

