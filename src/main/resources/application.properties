# ── LOGGING FIX ─────────────────────────────────────────────────
# BEFORE: logging.level.org.springframework.security=TRACE
# That was logging 13 filter invocations per request — adding 20-80ms
# of synchronous I/O on every single HTTP call. Changed to WARN.
logging.level.org.springframework.security=WARN
logging.level.com.hirex.security=WARN
logging.level.com.hirex=INFO
logging.level.com.hirex.controller.LiveInterviewController=DEBUG
logging.level.com.hirex.service.LiveInterviewService=DEBUG

app.cors.allowed-origins=https://hirex-f.onrender.com,http://localhost:3000,http://localhost:5173,http://localhost:4173

# ── WebRTC TURN server (production hardening) ────────────────────
# STUN alone (see LiveInterviewService.getIceServers) cannot traverse
# symmetric NATs or restrictive corporate firewalls — a real deployment
# needs at least one TURN server or some fraction of recruiter/candidate
# pairs will simply never connect with no obvious error message.
# Leave blank to keep STUN-only (fine for local dev / open networks).
app.webrtc.turn-url=${TURN_URL:}
app.webrtc.turn-username=${TURN_USERNAME:}
app.webrtc.turn-credential=${TURN_CREDENTIAL:}

# Base URL of the deployed frontend — used to build the "Join Interview" link
# sent in chat (e.g. https://your-frontend.com/interview/{token}).
app.frontend-url=${FRONTEND_URL:https://hirex-f.onrender.com}

# ────────────────────────────────────────────────────────────────

# ── JPA ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=2000

